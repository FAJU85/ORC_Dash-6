# ============================================
# ORC RESEARCH DASHBOARD - SECRETS TEMPLATE
# ============================================
# 
# INSTRUCTIONS:
# 1. Copy this content to Streamlit Cloud Secrets
#    (Settings → Secrets → Paste → Save)
# 2. Replace ALL placeholder values with your actual credentials
# 3. NEVER share your actual secrets file
#
# ============================================

# ===========================================
# REQUIRED: Database (Cloudflare D1)
# ===========================================
# Get these from Cloudflare Dashboard:
# 1. Account ID: Dashboard → Overview → Account ID
# 2. API Token: Dashboard → Profile → API Tokens → Create (D1 Edit)
# 3. Database ID: Dashboard → D1 → Your Database → Database ID

CLOUDFLARE_ACCOUNT_ID = "your_cloudflare_account_id_here"
CLOUDFLARE_API_TOKEN = "your_cloudflare_api_token_here"
CLOUDFLARE_D1_DATABASE_ID = "your_database_id_here"

# ===========================================
# REQUIRED: AI Service
# ===========================================
# Get API key from: https://console.groq.com
# Note: Do not share this key

AI_API_KEY = "your_ai_api_key_here"

# ===========================================
# REQUIRED: Researcher Profile
# ===========================================
[researcher]
name = "Your Name"
orcid = "0000-0000-0000-0000"
institution = "Your Institution"
email = "your@email.com"

# ===========================================
# REQUIRED: Admin Authentication
# ===========================================
# Generate password hash:
# python -c "import hashlib; print(hashlib.sha256('YOUR_PASSWORD'.encode()).hexdigest())"
#
# Example for password "admin123":
# 240be518fabd2724ddb6f04eeb9d5b03e7cd95e01e825ad9f7d5e5ecb4d9a1a3

[admin]
email = "ee.ee455@gmail.com"
password_hash = "240be518fabd2724ddb6f04eeb9d5b03e7cd95e01e825ad9f7d5e5ecb4d9a1a3"

# ===========================================
# OPTIONAL: Email OTP (SMTP)
# ===========================================
# For Gmail: Use App Password, not regular password
# Create at: https://myaccount.google.com/apppasswords
# Without this, OTP will be shown in demo mode

[smtp]
host = "smtp.gmail.com"
port = "587"
user = "your_email@gmail.com"
password = "your_app_password"

# ===========================================
# OPTIONAL: Bug Report - Telegram
# ===========================================
# Create bot: @BotFather → /newbot
# Get chat ID: @userinfobot

[telegram]
bot_token = "your_telegram_bot_token"
admin_chat_id = "your_telegram_chat_id"

# ===========================================
# OPTIONAL: Bug Report - GitHub Issues
# ===========================================
# Create token: github.com/settings/tokens
# Required scope: repo

[github]
token = "your_github_token"
owner = "your_github_username"
repo = "your_repo_name"
