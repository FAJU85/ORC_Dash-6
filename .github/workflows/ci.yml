name: CI — Tests

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          # Provide dummy values so modules that read secrets don't crash
          HF_TOKEN: "dummy"
          HF_REPO_ID: "dummy/dummy"
          GROQ_API_KEY: "dummy"
        run: pytest tests/ -v --tb=short
