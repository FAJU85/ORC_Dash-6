# ============================================
# ORC RESEARCH DASHBOARD - SECRETS TEMPLATE
# ============================================
#
# INSTRUCTIONS:
# 1. Copy this file to your deployment secrets store.
#    - Local dev:       .streamlit/secrets.toml
#    - HF Spaces:       Repository → Settings → Variables and Secrets
#    - GitHub Actions:  Repository → Settings → Secrets and variables
# 2. Replace ALL placeholder values with your actual credentials.
# 3. NEVER commit your actual secrets file to version control.
#
# ============================================

# ===========================================
# REQUIRED: Hugging Face Dataset (data storage)
# ===========================================
# Create a dataset repository at huggingface.co and generate an
# access token with Write permission.

HF_TOKEN   = "your_huggingface_write_token"
HF_REPO_ID = "your-username/your-dataset-repo"

# ===========================================
# REQUIRED: HF Space (for CI sync)
# ===========================================
# Set this as a GitHub Actions secret named HF_SPACE_ID.
# Format: "your-username/your-space-name"
# This is used by .github/workflows/sync-to-hub.yml

# HF_SPACE_ID = "your-username/your-space-name"   # set in GitHub Secrets

# ===========================================
# REQUIRED: AI Service
# ===========================================
# Obtain from your AI provider's console.

AI_API_KEY = "your_ai_api_key"

# Optional: override the language model used
# AI_MODEL = "llama-3.3-70b-versatile"

# ===========================================
# REQUIRED: Researcher Profile
# ===========================================

[researcher]
name        = "Your Name"
orcid       = "0000-0000-0000-0000"
institution = "Your Institution"
email       = "your@email.com"

# ===========================================
# REQUIRED: Admin Authentication
# ===========================================
# Generate a bcrypt hash for your password:
#   python -c "import bcrypt; print(bcrypt.hashpw(b'YOUR_PASSWORD', bcrypt.gensalt(12)).decode())"
#
# Legacy SHA-256 hashes are still accepted for backwards compatibility:
#   python -c "import hashlib; print(hashlib.sha256(b'YOUR_PASSWORD').hexdigest())"
#
# Demo credentials (email: ee.ee455@gmail.com  /  password: admin123):
#   SHA-256 hash → 240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9
#   (Replace with a bcrypt hash in production)

[admin]
email         = "ee.ee455@gmail.com"
password_hash = "240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9"

# ===========================================
# OPTIONAL: Email OTP (SMTP)
# ===========================================
# Without this the OTP is shown on-screen (demo mode).
# For Gmail use an App Password, not your account password:
#   https://myaccount.google.com/apppasswords

[smtp]
host     = "smtp.gmail.com"
port     = "587"
user     = "your_email@gmail.com"
password = "your_app_password"

# ===========================================
# OPTIONAL: Bug Report → Telegram
# ===========================================
# Create a bot via @BotFather and get your chat ID via @userinfobot.

[telegram]
bot_token     = "your_telegram_bot_token"
admin_chat_id = "your_telegram_chat_id"

# ===========================================
# OPTIONAL: Bug Report → GitHub Issues
# ===========================================
# Create a personal access token with the "repo" scope.

[github]
token = "your_github_token"
owner = "your_github_username"
repo  = "your_repo_name"
